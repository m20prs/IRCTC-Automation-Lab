serenity {
    project.name = "IRCTC Automation Lab"
    test.root = "stepdefinitions"
    tag.failures = "true"

    # Screenshot configuration
    take.screenshots = FOR_EACH_ACTION
    console.colors = true

    # Report formats
    reports = ["html", "json"]
    compress.screenshots = false

    # Retry configuration
    max.retries = 3
    retry.delay.ms = 1000
}

# Custom wait configurations
captcha.wait.seconds = 15
server.response.timeout = 25000
element.timeout = 30000

webdriver {
    driver = chrome
    autodriver = true
    headless = false

    # Explicit wait configuration
    implicit.wait.timeout = 10000      # 10 seconds implicit wait
    wait.for.timeout = 25000           # Explicit waits
    element.timeout = 30000            # Element visibility timeout
    page.load.timeout = 60000          # Page load timeout
}

capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
    "goog:chromeOptions" {
        args = [
            "remote-allow-origins=*",
            "window-size=1920,1080",
            "start-maximized",
            "disable-notifications",
            "disable-infobars",
            "disable-blink-features=AutomationControlled",
            "no-sandbox"
        ]
        excludeSwitches = ["enable-automation"]
        prefs {
            # Disable notifications and geolocation
            "profile.default_content_setting_values.notifications" = 2
            "profile.managed_default_content_settings.notifications" = 2
            "profile.default_content_setting_values.geolocation" = 2
        }
    }
}

environments {
    default {
        webdriver.base.url = "https://www.irctc.co.in/nget/train-search"
    }

    staging {
        webdriver.base.url = "https://staging.irctc.co.in/nget/train-search"
    }
}